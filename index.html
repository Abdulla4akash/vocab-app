<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>maXvocab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400..800&family=Fraunces:opsz,wght@9..144,600..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4efe6;
      --bg-top: #fbf6ec;
      --surface: #fff8ee;
      --surface-strong: #fffaf3;
      --surface-alpha: rgba(255, 248, 238, 0.86);
      --surface-panel: rgba(250, 241, 228, 0.82);
      --surface-card: rgba(255, 250, 241, 0.96);
      --surface-ghost: rgba(255, 248, 238, 0.68);
      --text: #2b2621;
      --muted: #75685b;
      --line: rgba(84, 65, 47, 0.15);
      --accent: #b3763f;
      --accent-dark: #8d5a2f;
      --accent-soft: rgba(179, 118, 63, 0.14);
      --accent-border-soft: rgba(179, 118, 63, 0.16);
      --accent-border: rgba(179, 118, 63, 0.28);
      --accent-border-strong: rgba(179, 118, 63, 0.46);
      --ambient: rgba(93, 63, 36, 0.055);
      --focus: #a86432;
      --shadow: 0 24px 70px rgba(55, 42, 29, 0.13);
      --small-shadow: 0 14px 34px rgba(55, 42, 29, 0.075);
      --hover-shadow: 0 22px 48px rgba(55, 42, 29, 0.13);
      --placeholder: #948579;
      --danger-bg: #fff4eb;
      --danger-border: #c48762;
      --danger-text: #6f2f20;
      --story-text: #3f352c;
      --on-accent: #ffffff;
      --radius: 16px;
      --ease: cubic-bezier(0.25, 1, 0.5, 1);
      color-scheme: light;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1815;
        --bg-top: #24201b;
        --surface: #27231e;
        --surface-strong: #302a23;
        --surface-alpha: rgba(39, 35, 30, 0.88);
        --surface-panel: rgba(43, 38, 32, 0.82);
        --surface-card: rgba(47, 41, 34, 0.96);
        --surface-ghost: rgba(45, 40, 34, 0.68);
        --text: #f3eadc;
        --muted: #c9bbaa;
        --line: rgba(237, 217, 188, 0.14);
        --accent: #d39859;
        --accent-dark: #e7b779;
        --accent-soft: rgba(211, 152, 89, 0.18);
        --accent-border-soft: rgba(211, 152, 89, 0.18);
        --accent-border: rgba(211, 152, 89, 0.32);
        --accent-border-strong: rgba(211, 152, 89, 0.52);
        --ambient: rgba(211, 152, 89, 0.07);
        --focus: #e6ad72;
        --shadow: 0 26px 76px rgba(0, 0, 0, 0.42);
        --small-shadow: 0 16px 38px rgba(0, 0, 0, 0.28);
        --hover-shadow: 0 24px 56px rgba(0, 0, 0, 0.36);
        --placeholder: #9f927f;
        --danger-bg: #332018;
        --danger-border: #a56848;
        --danger-text: #f1c3aa;
        --story-text: #f0e4d3;
        --on-accent: #24170e;
        color-scheme: dark;
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      background:
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 46%, var(--bg) 100%);
    }

    button,
    select {
      font: inherit;
    }

    button,
    input,
    select,
    .card-shell,
    .group-card {
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    .card-shell:focus-visible,
    .group-card:focus-visible {
      outline: 2px solid var(--accent-border-strong);
      outline-offset: 4px;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 0 40px;
      display: grid;
      align-content: start;
      gap: 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .brand-button {
      padding: 0;
      border: 0;
      color: var(--text);
      cursor: pointer;
      background: transparent;
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
      font-variation-settings: "opsz" 72;
    }

    .brand-button:hover {
      color: var(--accent-dark);
    }

    .brand-x {
      color: var(--accent);
      font-size: 1.08em;
      font-weight: 800;
    }

    .breadcrumbs {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .breadcrumb-button {
      max-width: min(38vw, 360px);
      padding: 4px 0;
      overflow: hidden;
      border: 0;
      color: inherit;
      cursor: pointer;
      background: transparent;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .breadcrumb-button:hover,
    .breadcrumb-button[aria-current="page"] {
      color: var(--accent-dark);
    }

    .breadcrumb-separator {
      color: var(--muted);
    }

    .subtitle {
      max-width: 680px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.55;
    }

    .status,
    .error {
      padding: 18px 20px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: var(--surface-panel);
      box-shadow: var(--shadow);
    }

    .error {
      border-color: var(--danger-border);
      color: var(--danger-text);
      background: var(--danger-bg);
    }

    .hidden {
      display: none !important;
    }

    .home {
      display: grid;
      gap: 24px;
    }

    .home-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
    }

    .home-header h2 {
      margin: 0;
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.05;
      font-variation-settings: "opsz" 48;
    }

    .total-count {
      margin: 0;
      color: var(--muted);
      font-weight: 600;
    }

    .home-actions {
      display: flex;
      align-items: center;
      justify-content: end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-panel {
      display: grid;
      gap: 10px;
    }

    .search-label {
      display: grid;
      gap: 8px;
      color: var(--accent-dark);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .search-input {
      width: 100%;
      min-height: 56px;
      padding: 0 18px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--text);
      background: var(--surface-card);
      box-shadow: var(--small-shadow);
      font-size: 1.08rem;
      transition: border-color 180ms var(--ease), background 180ms var(--ease), box-shadow 180ms var(--ease);
    }

    .search-input::placeholder {
      color: var(--placeholder);
    }

    .search-input:focus {
      border-color: var(--accent-border-strong);
      background: var(--surface-strong);
      box-shadow: var(--hover-shadow);
    }

    .search-results {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    .search-status {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .search-list {
      display: grid;
      gap: 8px;
    }

    .search-result {
      width: 100%;
      padding: 16px 18px;
      display: grid;
      grid-template-columns: minmax(140px, 0.36fr) 1fr;
      gap: 14px;
      align-items: start;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      background: var(--surface-alpha);
      box-shadow: var(--small-shadow);
      transition: transform 180ms var(--ease), border-color 180ms var(--ease), background 180ms var(--ease), box-shadow 180ms var(--ease);
    }

    .search-result:hover,
    .search-result.is-highlighted {
      transform: translateY(-1px);
      border-color: var(--accent-border);
      background: var(--surface-strong);
      box-shadow: var(--hover-shadow);
    }

    .result-word {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .result-name {
      overflow-wrap: anywhere;
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.42rem;
      font-weight: 750;
      line-height: 1.08;
      letter-spacing: 0;
      font-variation-settings: "opsz" 36;
    }

    .result-pos {
      color: var(--accent-dark);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .result-def {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .empty-state {
      margin: 0;
      padding: 18px 20px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--surface-panel);
      box-shadow: var(--small-shadow);
    }

    .group-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-auto-rows: 1fr;
      gap: 18px;
    }

    .group-card {
      position: relative;
      min-height: 218px;
      height: 218px;
      padding: 22px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      overflow: hidden;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      background: var(--surface-alpha);
      box-shadow: var(--small-shadow);
      transition: transform 200ms var(--ease), border-color 200ms var(--ease), box-shadow 200ms var(--ease), background 200ms var(--ease);
    }

    .group-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--accent);
      opacity: 0.2;
    }

    .group-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-border-soft);
      background: var(--surface-strong);
      box-shadow: var(--hover-shadow);
    }

    .group-card.all {
      grid-column: span 2;
      border-color: var(--accent-border-soft);
      background:
        linear-gradient(135deg, var(--accent-soft), var(--surface-card) 56%),
        var(--surface);
      box-shadow: var(--hover-shadow);
    }

    .cluster-number {
      display: block;
      color: var(--accent-dark);
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .cluster-copy {
      display: grid;
      align-content: start;
      gap: 9px;
    }

    .cluster-title {
      display: block;
      font-family: "Fraunces", Georgia, serif;
      font-size: 2rem;
      font-weight: 780;
      line-height: 1.04;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      font-variation-settings: "opsz" 48;
    }

    .cluster-desc {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.55;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
    }

    .cluster-count {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .study {
      display: grid;
      gap: 24px;
    }

    .study-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .study-title {
      display: grid;
      gap: 2px;
    }

    .study-title h2 {
      margin: 0;
      font-family: "Fraunces", Georgia, serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.08;
      font-variation-settings: "opsz" 56;
    }

    .study-actions {
      display: flex;
      align-items: center;
      justify-content: end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cluster-switch {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .cluster-select {
      max-width: min(42vw, 280px);
      min-height: 44px;
      padding: 0 34px 0 12px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      background-color: var(--surface);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
      box-shadow: var(--small-shadow);
    }

    .progress {
      color: var(--muted);
      font-weight: 600;
    }

    .drill-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: var(--surface-panel);
      box-shadow: var(--small-shadow);
    }

    .drill-stats {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .drill-stat {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .drill-stat strong {
      color: var(--text);
      font-size: 1.18rem;
      line-height: 1;
    }

    .drill-tally {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .new-best {
      padding: 3px 8px;
      border: 1px solid var(--accent-border);
      border-radius: 999px;
      color: var(--accent-dark);
      background: var(--accent-soft);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .drill-reset {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 0 12px;
      font-size: 0.85rem;
    }

    .card-stage {
      perspective: 1400px;
    }

    .card-shell {
      width: 100%;
      min-height: clamp(390px, 56vh, 560px);
      border: 0;
      padding: 0;
      display: block;
      color: inherit;
      cursor: pointer;
      background: transparent;
      text-align: inherit;
      touch-action: pan-y;
    }

    .flashcard {
      position: relative;
      width: 100%;
      min-height: inherit;
      transform-style: preserve-3d;
      transition: transform 640ms var(--ease);
    }

    .card-shell.is-flipped .flashcard {
      transform: rotateY(180deg);
    }

    @media (prefers-reduced-motion: no-preference) {
      .card-shell.swipe-next {
        animation: card-swipe-next 180ms var(--ease);
      }

      .card-shell.swipe-previous {
        animation: card-swipe-previous 180ms var(--ease);
      }

      @keyframes card-swipe-next {
        from {
          opacity: 0.94;
          transform: translateX(18px);
        }

        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes card-swipe-previous {
        from {
          opacity: 0.94;
          transform: translateX(-18px);
        }

        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    }

    .card-face {
      position: absolute;
      inset: 0;
      min-height: inherit;
      padding: clamp(28px, 6vw, 64px);
      display: grid;
      align-content: center;
      gap: 28px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: var(--surface-card);
      box-shadow: var(--shadow);
      backface-visibility: hidden;
      overflow: auto;
    }

    .card-back {
      transform: rotateY(180deg);
      align-content: start;
    }

    .word-wrap {
      display: grid;
      place-items: center;
      gap: 14px;
      text-align: center;
    }

    .word {
      max-width: 100%;
      margin: 0;
      overflow-wrap: anywhere;
      font-family: "Fraunces", Georgia, serif;
      font-size: 7rem;
      font-weight: 850;
      line-height: 0.92;
      letter-spacing: 0;
      font-variation-settings: "opsz" 144;
    }

    .part-of-speech {
      width: fit-content;
      margin: 0;
      padding: 7px 12px;
      border: 1px solid transparent;
      border-radius: 999px;
      color: var(--accent-dark);
      background: var(--accent-soft);
      font-weight: 800;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-weight: 600;
      text-align: center;
    }

    .definition-block {
      display: grid;
      gap: 24px;
    }

    .label {
      margin: 0 0 7px;
      color: var(--accent-dark);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .definition {
      margin: 0;
      font-size: 1.8rem;
      line-height: 1.55;
      letter-spacing: 0;
    }

    .sentence {
      margin: 0;
      color: var(--muted);
      font-size: 1.12rem;
      line-height: 1.6;
    }

    .story-area {
      display: grid;
      gap: 12px;
      padding-top: 4px;
    }

    .story-text {
      margin: 0;
      padding: 18px 20px;
      border-left: 3px solid var(--accent);
      color: var(--story-text);
      background: var(--accent-soft);
      border-radius: 0 var(--radius) var(--radius) 0;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .button {
      min-height: 44px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      background: var(--surface);
      box-shadow: var(--small-shadow);
      transition: transform 180ms var(--ease), border-color 180ms var(--ease), background 180ms var(--ease), color 180ms var(--ease), box-shadow 180ms var(--ease);
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--accent-border);
      background: var(--surface-strong);
      box-shadow: var(--hover-shadow);
    }

    .button.primary {
      border-color: var(--accent);
      color: var(--on-accent);
      background: var(--accent);
    }

    .button.primary:hover:not(:disabled) {
      color: var(--on-accent);
      background: var(--accent-dark);
    }

    .button.ghost {
      background: var(--surface-ghost);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    @media (max-width: 1040px) {
      .group-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 860px) {
      .group-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .group-card.all {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      .app {
        width: min(100% - 24px, 1120px);
        padding: 16px 0 24px;
        gap: 24px;
      }

      .topbar,
      .home-header,
      .study-header {
        align-items: start;
        flex-direction: column;
      }

      .breadcrumbs {
        width: 100%;
        flex-wrap: wrap;
      }

      .drill-panel {
        align-items: stretch;
        flex-direction: column;
      }

      .drill-reset {
        width: fit-content;
      }

      .home-actions,
      .study-actions {
        justify-content: start;
      }

      .cluster-select {
        max-width: calc(100vw - 128px);
      }

      .card-shell {
        min-height: 440px;
      }

      .card-face {
        padding: 26px 22px;
      }

      .word {
        font-size: 4.8rem;
      }

      .definition {
        font-size: 1.45rem;
      }

      .search-result {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .controls .button {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .group-grid {
        grid-template-columns: 1fr;
      }

      .word {
        font-size: 3.65rem;
      }

      .cluster-title,
      .study-title h2 {
        font-size: 1.65rem;
      }

      .controls {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button id="homeButton" class="brand-button" type="button" aria-label="maXvocab home">ma<span class="brand-x">X</span>vocab</button>
      <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb"></nav>
    </header>

    <section id="loading" class="status" aria-live="polite">Loading vocabulary...</section>
    <section id="error" class="error hidden" role="alert"></section>

    <section id="home" class="home hidden" aria-labelledby="homeTitle">
      <div class="home-header">
        <div>
          <h2 id="homeTitle">Choose a group</h2>
          <p id="homeSubtitle" class="subtitle">Pick a named cluster or study the full deck.</p>
        </div>
        <div class="home-actions">
          <p id="totalCount" class="total-count"></p>
          <button id="randomButton" class="button primary" type="button">Random word</button>
        </div>
      </div>
      <section class="search-panel" aria-label="Search vocabulary">
        <label class="search-label" for="searchInput">
          Search vocabulary
          <input id="searchInput" class="search-input" type="search" autocomplete="off" placeholder="Type a word or meaning..." aria-controls="searchResults" aria-describedby="searchStatus">
        </label>
        <div id="searchResults" class="search-results hidden">
          <p id="searchStatus" class="search-status" aria-live="polite"></p>
          <div id="searchList" class="search-list" role="listbox" aria-label="Search results"></div>
        </div>
      </section>
      <div id="groupGrid" class="group-grid"></div>
    </section>

    <section id="study" class="study hidden" aria-labelledby="studyTitle">
      <div class="study-header">
        <button id="backButton" class="button ghost" type="button">Back</button>
        <div class="study-title">
          <h2 id="studyTitle"></h2>
          <span id="progress" class="progress" aria-live="polite"></span>
        </div>
        <div class="study-actions">
          <label id="clusterSwitchWrap" class="cluster-switch hidden" for="clusterSelect">
            Cluster
            <select id="clusterSelect" class="cluster-select"></select>
          </label>
          <button id="shuffleButton" class="button ghost" type="button">Shuffle</button>
        </div>
      </div>

      <section id="drillPanel" class="drill-panel hidden" aria-label="Random word drill stats">
        <div class="drill-stats">
          <span class="drill-stat">Current <strong id="currentStreak">0</strong></span>
          <span class="drill-stat">Best <strong id="bestStreak">0</strong></span>
          <span id="newBestIndicator" class="new-best hidden">New best!</span>
          <p id="sessionTally" class="drill-tally">0 got · 0 missed · 0%</p>
        </div>
        <button id="resetStatsButton" class="button ghost drill-reset" type="button">Reset stats</button>
      </section>

      <div class="card-stage">
        <div id="cardShell" class="card-shell" role="button" tabindex="0" aria-label="Flip flashcard">
          <article class="flashcard">
            <div class="card-face card-front">
              <div class="word-wrap">
                <p id="word" class="word"></p>
                <p id="pos" class="part-of-speech"></p>
              </div>
              <p class="hint">Tap or press space to flip</p>
            </div>

            <div class="card-face card-back">
              <div class="definition-block">
                <div>
                  <p class="label">Definition</p>
                  <p id="definition" class="definition"></p>
                </div>
                <div>
                  <p class="label">Example</p>
                  <p id="sentence" class="sentence"></p>
                </div>
              </div>

              <div class="story-area">
                <button id="storyButton" class="button primary" type="button">Show story</button>
                <p id="storyText" class="story-text hidden"></p>
              </div>
            </div>
          </article>
        </div>
      </div>

      <nav class="controls" aria-label="Flashcard controls">
        <button id="previousButton" class="button" type="button">Previous</button>
        <button id="flipButton" class="button primary" type="button">Flip</button>
        <button id="nextButton" class="button" type="button">Next</button>
        <button id="gotButton" class="button primary hidden" type="button" disabled>Got it</button>
        <button id="missedButton" class="button hidden" type="button" disabled>Missed it</button>
      </nav>
    </section>
  </main>

  <script>
    const CLUSTER_COUNT = 33;
    const STUDY_GROUP_SIZE = 20;
    const SMALL_FINAL_GROUP_THRESHOLD = 7;
    const SEARCH_RESULT_LIMIT = 50;
    const SEARCH_DEBOUNCE_MS = 150;
    const SWIPE_THRESHOLD_PX = 50;
    const BEST_STREAK_STORAGE_KEY = "maXvocab.bestStreak";

    let searchDebounceId = null;
    let swipeAnimationId = null;
    let newBestFlashId = null;

    const touchGesture = {
      startX: 0,
      startY: 0,
      currentX: 0,
      currentY: 0,
      tracking: false,
      suppressClick: false
    };

    const state = {
      vocab: [],
      blurbs: {},
      clusters: {},
      studyGroupsByCluster: {},
      searchIndex: [],
      searchQuery: "",
      searchResults: [],
      highlightedSearchIndex: -1,
      currentView: "loading",
      currentDeck: [],
      currentIndex: 0,
      currentGroup: null,
      currentCluster: null,
      currentStudyGroup: null,
      drill: {
        bag: [],
        currentStreak: 0,
        bestStreak: 0,
        got: 0,
        missed: 0,
        dealt: 0,
        newBestVisible: false
      },
      flipped: false,
      storyVisible: false
    };

    const els = {
      loading: document.querySelector("#loading"),
      error: document.querySelector("#error"),
      home: document.querySelector("#home"),
      study: document.querySelector("#study"),
      homeTitle: document.querySelector("#homeTitle"),
      homeSubtitle: document.querySelector("#homeSubtitle"),
      homeButton: document.querySelector("#homeButton"),
      breadcrumbs: document.querySelector("#breadcrumbs"),
      searchInput: document.querySelector("#searchInput"),
      searchResults: document.querySelector("#searchResults"),
      searchStatus: document.querySelector("#searchStatus"),
      searchList: document.querySelector("#searchList"),
      groupGrid: document.querySelector("#groupGrid"),
      totalCount: document.querySelector("#totalCount"),
      randomButton: document.querySelector("#randomButton"),
      studyTitle: document.querySelector("#studyTitle"),
      progress: document.querySelector("#progress"),
      drillPanel: document.querySelector("#drillPanel"),
      currentStreak: document.querySelector("#currentStreak"),
      bestStreak: document.querySelector("#bestStreak"),
      newBestIndicator: document.querySelector("#newBestIndicator"),
      sessionTally: document.querySelector("#sessionTally"),
      resetStatsButton: document.querySelector("#resetStatsButton"),
      clusterSwitchWrap: document.querySelector("#clusterSwitchWrap"),
      clusterSelect: document.querySelector("#clusterSelect"),
      cardShell: document.querySelector("#cardShell"),
      word: document.querySelector("#word"),
      pos: document.querySelector("#pos"),
      definition: document.querySelector("#definition"),
      sentence: document.querySelector("#sentence"),
      storyButton: document.querySelector("#storyButton"),
      storyText: document.querySelector("#storyText"),
      backButton: document.querySelector("#backButton"),
      shuffleButton: document.querySelector("#shuffleButton"),
      previousButton: document.querySelector("#previousButton"),
      flipButton: document.querySelector("#flipButton"),
      nextButton: document.querySelector("#nextButton"),
      gotButton: document.querySelector("#gotButton"),
      missedButton: document.querySelector("#missedButton")
    };

    async function fetchJson(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`${path} returned ${response.status}`);
      }
      return response.json();
    }

    async function fetchOptionalJson(path) {
      try {
        return await fetchJson(path);
      } catch (error) {
        return {};
      }
    }

    async function init() {
      try {
        const [vocabData, blurbData, clusterData] = await Promise.all([
          fetchJson("vocab.json"),
          fetchJson("vocab_blurbs.json"),
          fetchOptionalJson("clusters.json")
        ]);

        state.vocab = Object.entries(vocabData)
          .map(([word, data]) => ({ word, ...data }))
          .sort((a, b) => a.word.localeCompare(b.word));
        state.blurbs = blurbData || {};
        state.clusters = clusterData || {};
        buildStudyGroups();
        buildSearchIndex();

        renderClusterOptions();
        showHome();
      } catch (error) {
        showError(error);
      }
    }

    function showError(error) {
      els.loading.classList.add("hidden");
      els.error.classList.remove("hidden");
      els.error.textContent = `Could not load the vocabulary files. Make sure vocab.json and vocab_blurbs.json are in this folder and the app is served over http, not opened with file://. Details: ${error.message}`;
    }

    function buildSearchIndex() {
      state.searchIndex = state.vocab.map((entry) => ({
        entry,
        wordText: entry.word.toLowerCase(),
        defText: String(entry.def || "").toLowerCase()
      }));
    }

    function buildStudyGroups() {
      state.studyGroupsByCluster = {};

      for (let cluster = 0; cluster < CLUSTER_COUNT; cluster += 1) {
        const clusterWords = state.vocab
          .filter((entry) => Number(entry.cluster) === cluster)
          .sort((a, b) => a.word.localeCompare(b.word));
        const chunks = [];

        for (let index = 0; index < clusterWords.length; index += STUDY_GROUP_SIZE) {
          chunks.push(clusterWords.slice(index, index + STUDY_GROUP_SIZE));
        }

        if (chunks.length > 1 && chunks[chunks.length - 1].length <= SMALL_FINAL_GROUP_THRESHOLD) {
          chunks[chunks.length - 2].push(...chunks.pop());
        }

        state.studyGroupsByCluster[cluster] = chunks.map((words, index) => ({
          cluster,
          groupNumber: index + 1,
          totalGroups: chunks.length,
          label: `C${cluster}G${index + 1}`,
          words
        }));
      }
    }

    function getClusterName(cluster) {
      const meta = state.clusters[String(cluster)] || {};
      return typeof meta.name === "string" && meta.name.trim()
        ? meta.name.trim()
        : `Cluster ${cluster}`;
    }

    function getClusterDescription(cluster) {
      const meta = state.clusters[String(cluster)] || {};
      return typeof meta.desc === "string" && meta.desc.trim()
        ? meta.desc.trim()
        : "";
    }

    function getClusterStudyGroups(cluster) {
      return state.studyGroupsByCluster[Number(cluster)] || [];
    }

    function getWordCountLabel(count) {
      return `${count.toLocaleString()} ${count === 1 ? "word" : "words"}`;
    }

    function getStudyGroupTitle(group) {
      return `${getClusterName(group.cluster)} — Group ${group.groupNumber} of ${group.totalGroups}`;
    }

    function getStudyGroupDescription(group) {
      const firstWord = group.words[0]?.word || "";
      const lastWord = group.words[group.words.length - 1]?.word || "";
      if (!firstWord) return "";
      return firstWord === lastWord ? firstWord : `${firstWord} to ${lastWord}`;
    }

    function isRandomDrill() {
      return state.currentGroup === "random";
    }

    function readSavedBestStreak() {
      try {
        const value = Number.parseInt(localStorage.getItem(BEST_STREAK_STORAGE_KEY), 10);
        return Number.isFinite(value) && value > 0 ? value : 0;
      } catch (error) {
        return 0;
      }
    }

    function saveBestStreak(value) {
      try {
        localStorage.setItem(BEST_STREAK_STORAGE_KEY, String(Math.max(0, value)));
      } catch (error) {
        // Best streak still updates in memory if browser storage is unavailable.
      }
    }

    function clearSavedBestStreak() {
      try {
        localStorage.removeItem(BEST_STREAK_STORAGE_KEY);
      } catch (error) {
        // Resetting the in-memory stats is enough when storage is unavailable.
      }
    }

    function resetDrillSession({ resetBest = false } = {}) {
      window.clearTimeout(newBestFlashId);
      state.drill.bag = [];
      state.drill.currentStreak = 0;
      state.drill.bestStreak = resetBest ? 0 : readSavedBestStreak();
      state.drill.got = 0;
      state.drill.missed = 0;
      state.drill.dealt = 0;
      state.drill.newBestVisible = false;
    }

    function refillDrillBag() {
      state.drill.bag = [...state.vocab];
      shuffleEntries(state.drill.bag);
    }

    function drawDrillCard() {
      if (!state.drill.bag.length) {
        refillDrillBag();
      }

      state.drill.dealt += 1;
      return state.drill.bag.pop();
    }

    function showNewBest() {
      window.clearTimeout(newBestFlashId);
      state.drill.newBestVisible = true;
      renderDrillPanel();

      newBestFlashId = window.setTimeout(() => {
        state.drill.newBestVisible = false;
        renderDrillPanel();
      }, 1300);
    }

    function renderClusterOptions() {
      els.clusterSelect.replaceChildren();

      for (let cluster = 0; cluster < CLUSTER_COUNT; cluster += 1) {
        const option = document.createElement("option");
        option.value = String(cluster);
        option.textContent = getClusterName(cluster);
        els.clusterSelect.appendChild(option);
      }
    }

    function renderBreadcrumbs() {
      els.breadcrumbs.replaceChildren();
      const isHome = state.currentView === "home" && !state.searchQuery;

      els.breadcrumbs.appendChild(createBreadcrumbButton("Home", () => showHome(), isHome));

      const addSegment = (label, action, isCurrent = true) => {
        const separator = document.createElement("span");
        separator.className = "breadcrumb-separator";
        separator.textContent = "›";
        els.breadcrumbs.appendChild(separator);
        els.breadcrumbs.appendChild(createBreadcrumbButton(label, action, isCurrent));
      };

      if (state.currentView === "home" && state.searchQuery) {
        addSegment("Search", () => els.searchInput.focus({ preventScroll: true }));
        return;
      }

      if (state.currentView === "cluster" && state.searchQuery) {
        addSegment("Search", () => els.searchInput.focus({ preventScroll: true }));
        return;
      }

      if (state.currentView === "cluster") {
        addSegment(getClusterName(state.currentCluster), () => showClusterGroups(state.currentCluster));
        return;
      }

      if (state.currentView !== "study") return;

      if (state.currentGroup === "search") {
        addSegment("Search", () => showHome({ preserveSearch: true, focusSearch: true }));
        return;
      }

      if (state.currentGroup === "all") {
        addSegment("All words", () => {});
        return;
      }

      if (state.currentGroup === "random") {
        addSegment("Random word", () => {});
        return;
      }

      if (state.currentStudyGroup) {
        const group = state.currentStudyGroup;
        addSegment(getClusterName(group.cluster), () => showClusterGroups(group.cluster), false);
        addSegment(`Group ${group.groupNumber} of ${group.totalGroups}`, () => {});
        return;
      }

      addSegment(getClusterName(state.currentGroup), () => showClusterGroups(state.currentGroup));
    }

    function createBreadcrumbButton(label, action, isCurrent = false) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "breadcrumb-button";
      button.textContent = label;
      if (isCurrent) {
        button.setAttribute("aria-current", "page");
      }
      button.addEventListener("click", action);
      return button;
    }

    function renderHomeGroups() {
      const counts = Array.from({ length: CLUSTER_COUNT }, (_, cluster) =>
        state.vocab.filter((entry) => Number(entry.cluster) === cluster).length
      );

      els.homeTitle.textContent = "Choose a cluster";
      els.homeSubtitle.textContent = "Pick a named cluster or study the full deck.";
      els.totalCount.textContent = `${state.vocab.length.toLocaleString()} words total`;
      els.groupGrid.replaceChildren();

      els.groupGrid.appendChild(createGroupButton({
        title: "All words",
        label: "Full deck",
        description: "Study every word from every cluster in one complete deck.",
        count: state.vocab.length,
        isAll: true,
        onClick: () => startStudy("all")
      }));

      counts.forEach((count, cluster) => {
        els.groupGrid.appendChild(createGroupButton({
          title: getClusterName(cluster),
          label: `Cluster ${String(cluster).padStart(2, "0")}`,
          description: getClusterDescription(cluster),
          count,
          onClick: () => showClusterGroups(cluster)
        }));
      });
    }

    function renderClusterGroups(cluster) {
      const groups = getClusterStudyGroups(cluster);
      const totalWords = groups.reduce((sum, group) => sum + group.words.length, 0);

      els.homeTitle.textContent = getClusterName(cluster);
      els.homeSubtitle.textContent = getClusterDescription(cluster) || "Choose a study group from this cluster.";
      els.totalCount.textContent = `${getWordCountLabel(totalWords)} in ${groups.length} ${groups.length === 1 ? "group" : "groups"}`;
      els.groupGrid.replaceChildren();

      groups.forEach((group) => {
        els.groupGrid.appendChild(createGroupButton({
          title: getStudyGroupTitle(group),
          label: group.label,
          description: getStudyGroupDescription(group),
          count: group.words.length,
          onClick: () => startStudyGroup(group)
        }));
      });
    }

    function createGroupButton({ title, label, description = "", count, isAll = false, onClick }) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `group-card${isAll ? " all" : ""}`;
      button.setAttribute("aria-label", `${title}, ${getWordCountLabel(count)}`);

      const eyebrow = document.createElement("span");
      eyebrow.className = "cluster-number";
      eyebrow.textContent = label;

      const copy = document.createElement("span");
      copy.className = "cluster-copy";

      const heading = document.createElement("span");
      heading.className = "cluster-title";
      heading.textContent = title;
      copy.appendChild(heading);

      if (description) {
        const subtitle = document.createElement("span");
        subtitle.className = "cluster-desc";
        subtitle.textContent = description;
        copy.appendChild(subtitle);
      }

      const wordCount = document.createElement("span");
      wordCount.className = "cluster-count";
      wordCount.textContent = getWordCountLabel(count);

      button.append(eyebrow, copy, wordCount);
      button.addEventListener("click", onClick);
      return button;
    }

    function scheduleSearch() {
      window.clearTimeout(searchDebounceId);

      if (!els.searchInput.value.trim()) {
        applySearch("");
        return;
      }

      searchDebounceId = window.setTimeout(() => {
        applySearch(els.searchInput.value);
      }, SEARCH_DEBOUNCE_MS);
    }

    function applySearch(value) {
      const query = value.trim();
      state.searchQuery = query;

      if (!query) {
        state.searchResults = [];
        state.highlightedSearchIndex = -1;
        renderSearchState();
        return;
      }

      state.searchResults = getSearchMatches(query);
      state.highlightedSearchIndex = state.searchResults.length ? 0 : -1;
      renderSearchState();
    }

    function getSearchMatches(query) {
      const normalized = query.toLowerCase();

      return state.searchIndex
        .map(({ entry, wordText, defText }) => {
          const wordIndex = wordText.indexOf(normalized);
          const defIndex = defText.indexOf(normalized);

          if (wordIndex === -1 && defIndex === -1) {
            return null;
          }

          const rank = wordIndex === 0 ? 0 : wordIndex > 0 ? 1 : 2;
          return { entry, rank, wordIndex, defIndex };
        })
        .filter(Boolean)
        .sort((a, b) => {
          if (a.rank !== b.rank) return a.rank - b.rank;
          if (a.rank < 2 && a.wordIndex !== b.wordIndex) return a.wordIndex - b.wordIndex;
          return a.entry.word.localeCompare(b.entry.word);
        })
        .map((match) => match.entry);
    }

    function renderSearchState() {
      const hasQuery = Boolean(state.searchQuery);
      els.groupGrid.classList.toggle("hidden", hasQuery);
      els.searchResults.classList.toggle("hidden", !hasQuery);
      els.searchList.replaceChildren();

      if (!hasQuery) {
        els.searchStatus.textContent = "";
        els.searchInput.removeAttribute("aria-activedescendant");
        renderBreadcrumbs();
        return;
      }

      if (!state.searchResults.length) {
        els.searchStatus.textContent = "0 matches.";
        els.searchInput.removeAttribute("aria-activedescendant");
        const empty = document.createElement("p");
        empty.className = "empty-state";
        empty.textContent = `No words match '${state.searchQuery}'.`;
        els.searchList.appendChild(empty);
        renderBreadcrumbs();
        return;
      }

      const visibleResults = state.searchResults.slice(0, SEARCH_RESULT_LIMIT);
      els.searchStatus.textContent = state.searchResults.length > SEARCH_RESULT_LIMIT
        ? `Showing first ${SEARCH_RESULT_LIMIT} of ${state.searchResults.length.toLocaleString()} matches.`
        : `${state.searchResults.length.toLocaleString()} ${state.searchResults.length === 1 ? "match" : "matches"}.`;

      visibleResults.forEach((entry, index) => {
        els.searchList.appendChild(createSearchResultButton(entry, index));
      });

      updateSearchHighlight(false);
      renderBreadcrumbs();
    }

    function createSearchResultButton(entry, index) {
      const button = document.createElement("button");
      button.type = "button";
      button.id = `search-result-${index}`;
      button.className = `search-result${index === state.highlightedSearchIndex ? " is-highlighted" : ""}`;
      button.setAttribute("role", "option");
      button.setAttribute("aria-selected", String(index === state.highlightedSearchIndex));
      button.setAttribute("aria-label", `${entry.word}, ${entry.pos || "part of speech unavailable"}`);

      const wordWrap = document.createElement("span");
      wordWrap.className = "result-word";

      const name = document.createElement("span");
      name.className = "result-name";
      name.textContent = entry.word;

      const pos = document.createElement("span");
      pos.className = "result-pos";
      pos.textContent = entry.pos || "pos unavailable";

      const definition = document.createElement("p");
      definition.className = "result-def";
      definition.textContent = getDefinitionSnippet(entry, state.searchQuery);

      wordWrap.append(name, pos);
      button.append(wordWrap, definition);

      button.addEventListener("click", () => openSearchResult(index));
      button.addEventListener("focus", () => setHighlightedSearchIndex(index, false));
      button.addEventListener("mouseenter", () => setHighlightedSearchIndex(index, false));
      button.addEventListener("keydown", handleSearchResultKeydown);

      return button;
    }

    function getDefinitionSnippet(entry, query) {
      const definition = String(entry.def || "Definition unavailable.");
      const normalized = query.toLowerCase();
      const matchIndex = definition.toLowerCase().indexOf(normalized);
      const maxLength = 140;

      if (definition.length <= maxLength) {
        return definition;
      }

      if (matchIndex === -1) {
        return `${definition.slice(0, maxLength).trim()}...`;
      }

      const start = Math.max(0, matchIndex - 42);
      const end = Math.min(definition.length, matchIndex + normalized.length + 86);
      const prefix = start > 0 ? "..." : "";
      const suffix = end < definition.length ? "..." : "";
      return `${prefix}${definition.slice(start, end).trim()}${suffix}`;
    }

    function setHighlightedSearchIndex(index, shouldFocus) {
      const visibleCount = Math.min(SEARCH_RESULT_LIMIT, state.searchResults.length);
      if (!visibleCount) {
        state.highlightedSearchIndex = -1;
        updateSearchHighlight(false);
        return;
      }

      state.highlightedSearchIndex = (index + visibleCount) % visibleCount;
      updateSearchHighlight(shouldFocus);
    }

    function updateSearchHighlight(shouldFocus) {
      const options = [...els.searchList.querySelectorAll(".search-result")];
      options.forEach((option, index) => {
        const selected = index === state.highlightedSearchIndex;
        option.classList.toggle("is-highlighted", selected);
        option.setAttribute("aria-selected", String(selected));
      });

      if (state.highlightedSearchIndex >= 0) {
        const active = document.getElementById(`search-result-${state.highlightedSearchIndex}`);
        els.searchInput.setAttribute("aria-activedescendant", `search-result-${state.highlightedSearchIndex}`);
        if (shouldFocus && active) {
          active.focus({ preventScroll: true });
        }
      } else {
        els.searchInput.removeAttribute("aria-activedescendant");
      }
    }

    function handleSearchInputKeydown(event) {
      const isNavigationKey = event.key === "ArrowDown" || event.key === "ArrowUp" || event.key === "Enter";
      if (!isNavigationKey) return;

      const currentValue = els.searchInput.value.trim();
      if (currentValue !== state.searchQuery) {
        window.clearTimeout(searchDebounceId);
        applySearch(currentValue);
      }

      if (!state.searchQuery || !state.searchResults.length) return;

      if (event.key === "ArrowDown") {
        event.preventDefault();
        setHighlightedSearchIndex(state.highlightedSearchIndex + 1, true);
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();
        setHighlightedSearchIndex(state.highlightedSearchIndex - 1, true);
      }

      if (event.key === "Enter") {
        event.preventDefault();
        openSearchResult(state.highlightedSearchIndex >= 0 ? state.highlightedSearchIndex : 0);
      }
    }

    function handleSearchResultKeydown(event) {
      if (event.key === "ArrowDown") {
        event.preventDefault();
        setHighlightedSearchIndex(state.highlightedSearchIndex + 1, true);
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();
        setHighlightedSearchIndex(state.highlightedSearchIndex - 1, true);
      }

      if (event.key === "Escape") {
        event.preventDefault();
        els.searchInput.focus({ preventScroll: true });
      }
    }

    function openSearchResult(index) {
      const card = state.searchResults[index];
      if (!card) return;

      state.currentView = "study";
      state.currentGroup = "search";
      state.currentCluster = null;
      state.currentStudyGroup = null;
      state.currentDeck = [...state.searchResults];
      state.currentIndex = index;
      state.flipped = false;
      state.storyVisible = false;

      els.home.classList.add("hidden");
      els.study.classList.remove("hidden");
      renderCard();
      els.cardShell.focus({ preventScroll: true });
    }

    function openRandomWord() {
      if (!state.vocab.length) return;

      resetDrillSession();
      state.currentView = "study";
      state.currentGroup = "random";
      state.currentCluster = null;
      state.currentStudyGroup = null;
      state.currentDeck = [drawDrillCard()];
      state.currentIndex = 0;
      state.flipped = false;
      state.storyVisible = false;

      els.home.classList.add("hidden");
      els.study.classList.remove("hidden");
      renderCard();
      els.cardShell.focus({ preventScroll: true });
    }

    function advanceRandomDrill() {
      state.currentDeck = [drawDrillCard()];
      state.currentIndex = 0;
      state.flipped = false;
      state.storyVisible = false;
      renderCard();
      els.cardShell.focus({ preventScroll: true });
    }

    function recordDrillResult(wasCorrect) {
      if (!isRandomDrill() || !state.flipped) return;

      if (wasCorrect) {
        state.drill.got += 1;
        state.drill.currentStreak += 1;

        if (state.drill.currentStreak > state.drill.bestStreak) {
          state.drill.bestStreak = state.drill.currentStreak;
          saveBestStreak(state.drill.bestStreak);
          showNewBest();
        }
      } else {
        state.drill.missed += 1;
        state.drill.currentStreak = 0;
      }

      advanceRandomDrill();
    }

    function resetDrillStats() {
      if (!isRandomDrill()) return;

      const confirmed = window.confirm("Reset streak stats for this drill?");
      if (!confirmed) return;

      clearSavedBestStreak();
      resetDrillSession({ resetBest: true });
      state.currentDeck = [drawDrillCard()];
      state.currentIndex = 0;
      state.flipped = false;
      state.storyVisible = false;
      renderCard();
      els.cardShell.focus({ preventScroll: true });
    }

    function startStudy(group) {
      const deck = group === "all"
        ? state.vocab
        : state.vocab.filter((entry) => Number(entry.cluster) === Number(group));

      state.currentView = "study";
      state.currentGroup = group;
      state.currentCluster = typeof group === "number" ? group : null;
      state.currentStudyGroup = null;
      state.currentDeck = [...deck];
      state.currentIndex = 0;
      state.flipped = false;
      state.storyVisible = false;

      els.home.classList.add("hidden");
      els.study.classList.remove("hidden");
      renderCard();
      els.cardShell.focus({ preventScroll: true });
    }

    function startStudyGroup(group) {
      state.currentView = "study";
      state.currentGroup = group.cluster;
      state.currentCluster = group.cluster;
      state.currentStudyGroup = group;
      state.currentDeck = [...group.words];
      state.currentIndex = 0;
      state.flipped = false;
      state.storyVisible = false;

      els.home.classList.add("hidden");
      els.study.classList.remove("hidden");
      renderCard();
      els.cardShell.focus({ preventScroll: true });
    }

    function showHome({ preserveSearch = false, focusSearch = false } = {}) {
      if (!state.vocab.length) return;

      state.currentView = "home";
      state.currentGroup = null;
      state.currentCluster = null;
      state.currentStudyGroup = null;
      state.currentDeck = [];
      state.currentIndex = 0;
      state.flipped = false;
      state.storyVisible = false;

      if (!preserveSearch) {
        state.searchQuery = "";
        state.searchResults = [];
        state.highlightedSearchIndex = -1;
        els.searchInput.value = "";
      }

      els.loading.classList.add("hidden");
      els.error.classList.add("hidden");
      els.study.classList.add("hidden");
      els.home.classList.remove("hidden");
      renderHomeGroups();
      renderSearchState();

      if (focusSearch && state.searchQuery) {
        els.searchInput.focus({ preventScroll: true });
      }
    }

    function showClusterGroups(cluster) {
      if (!state.vocab.length) return;

      const clusterNumber = Number(cluster);
      state.currentView = "cluster";
      state.currentGroup = null;
      state.currentCluster = clusterNumber;
      state.currentStudyGroup = null;
      state.currentDeck = [];
      state.currentIndex = 0;
      state.flipped = false;
      state.storyVisible = false;
      state.searchQuery = "";
      state.searchResults = [];
      state.highlightedSearchIndex = -1;
      els.searchInput.value = "";

      els.loading.classList.add("hidden");
      els.error.classList.add("hidden");
      els.study.classList.add("hidden");
      els.home.classList.remove("hidden");
      renderClusterGroups(clusterNumber);
      renderSearchState();
    }

    function handleBack() {
      if (state.currentGroup === "search") {
        showHome({ preserveSearch: true, focusSearch: true });
        return;
      }

      if (state.currentStudyGroup) {
        showClusterGroups(state.currentStudyGroup.cluster);
        return;
      }

      showHome();
    }

    function getDrillTallyLabel() {
      const total = state.drill.got + state.drill.missed;
      const percentage = total ? Math.round((state.drill.got / total) * 100) : 0;
      return `${state.drill.got} got · ${state.drill.missed} missed · ${percentage}%`;
    }

    function renderDrillPanel() {
      const isDrill = isRandomDrill();
      els.drillPanel.classList.toggle("hidden", !isDrill);
      els.gotButton.classList.toggle("hidden", !isDrill);
      els.missedButton.classList.toggle("hidden", !isDrill);

      if (!isDrill) return;

      const canRate = state.flipped;
      els.currentStreak.textContent = String(state.drill.currentStreak);
      els.bestStreak.textContent = String(state.drill.bestStreak);
      els.sessionTally.textContent = getDrillTallyLabel();
      els.newBestIndicator.classList.toggle("hidden", !state.drill.newBestVisible);
      els.gotButton.disabled = !canRate;
      els.missedButton.disabled = !canRate;
    }

    function renderStudyControls() {
      const isDrill = isRandomDrill();
      const isClusterStudy = typeof state.currentGroup === "number";
      els.clusterSwitchWrap.classList.toggle("hidden", !isClusterStudy);
      els.shuffleButton.classList.toggle("hidden", isDrill);
      els.previousButton.classList.toggle("hidden", isDrill);
      els.nextButton.classList.toggle("hidden", isDrill);

      if (isClusterStudy) {
        els.clusterSelect.value = String(state.currentGroup);
      }

      renderDrillPanel();
    }

    function renderCard() {
      const card = state.currentDeck[state.currentIndex];
      if (!card) return;

      const groupName = state.currentGroup === "all"
        ? "All words"
        : state.currentGroup === "search"
          ? (state.searchQuery ? `Search: ${state.searchQuery}` : "Search results")
          : state.currentGroup === "random"
            ? "Random word drill"
            : state.currentStudyGroup
              ? getStudyGroupTitle(state.currentStudyGroup)
              : getClusterName(state.currentGroup);
      const hasStory = Boolean(state.blurbs[card.word]);

      els.studyTitle.textContent = groupName;
      els.progress.textContent = isRandomDrill()
        ? `Card ${state.drill.dealt}`
        : `Card ${state.currentIndex + 1} of ${state.currentDeck.length}`;
      els.word.textContent = card.word;
      els.pos.textContent = card.pos || "part of speech unavailable";
      els.definition.textContent = card.def || "Definition unavailable.";
      els.sentence.textContent = card.sentence || "Example sentence unavailable.";

      els.cardShell.classList.toggle("is-flipped", state.flipped);
      els.cardShell.setAttribute("aria-pressed", String(state.flipped));
      els.storyText.classList.toggle("hidden", !state.storyVisible);
      els.storyText.textContent = state.storyVisible && hasStory ? state.blurbs[card.word] : "";

      els.storyButton.disabled = !hasStory;
      els.storyButton.textContent = hasStory
        ? (state.storyVisible ? "Hide story" : "Show story")
        : "No story yet";

      els.previousButton.disabled = state.currentDeck.length <= 1;
      els.nextButton.disabled = state.currentDeck.length <= 1;
      els.shuffleButton.disabled = state.currentDeck.length <= 1;
      renderStudyControls();
      renderBreadcrumbs();
    }

    function flipCard() {
      state.flipped = !state.flipped;
      renderCard();
    }

    function handleCardClick(event) {
      if (touchGesture.suppressClick) {
        event.preventDefault();
        event.stopPropagation();
        touchGesture.suppressClick = false;
        return;
      }

      flipCard();
    }

    function moveCard(direction) {
      if (!state.currentDeck.length) return;
      if (isRandomDrill()) return;
      const total = state.currentDeck.length;
      if (total <= 1) return;
      state.currentIndex = (state.currentIndex + direction + total) % total;
      state.flipped = false;
      state.storyVisible = false;
      renderCard();
    }

    function handleCardTouchStart(event) {
      if (event.touches.length !== 1) {
        touchGesture.tracking = false;
        return;
      }

      const touch = event.touches[0];
      touchGesture.startX = touch.clientX;
      touchGesture.startY = touch.clientY;
      touchGesture.currentX = touch.clientX;
      touchGesture.currentY = touch.clientY;
      touchGesture.tracking = true;
    }

    function handleCardTouchMove(event) {
      if (!touchGesture.tracking || event.touches.length !== 1) return;

      const touch = event.touches[0];
      touchGesture.currentX = touch.clientX;
      touchGesture.currentY = touch.clientY;

      const deltaX = touchGesture.currentX - touchGesture.startX;
      const deltaY = touchGesture.currentY - touchGesture.startY;

      if (Math.abs(deltaX) > SWIPE_THRESHOLD_PX && Math.abs(deltaX) > Math.abs(deltaY)) {
        event.preventDefault();
      }
    }

    function handleCardTouchEnd(event) {
      if (!touchGesture.tracking) return;

      if (event.changedTouches.length) {
        const touch = event.changedTouches[0];
        touchGesture.currentX = touch.clientX;
        touchGesture.currentY = touch.clientY;
      }

      const deltaX = touchGesture.currentX - touchGesture.startX;
      const deltaY = touchGesture.currentY - touchGesture.startY;
      const isSwipe = Math.abs(deltaX) > SWIPE_THRESHOLD_PX && Math.abs(deltaX) > Math.abs(deltaY);
      touchGesture.tracking = false;

      if (!isSwipe) return;

      event.preventDefault();
      touchGesture.suppressClick = true;

      if (deltaX < 0) {
        moveCard(1);
        animateSwipe("swipe-next");
      } else {
        moveCard(-1);
        animateSwipe("swipe-previous");
      }

      window.setTimeout(() => {
        touchGesture.suppressClick = false;
      }, 350);
    }

    function handleCardTouchCancel() {
      touchGesture.tracking = false;
    }

    function animateSwipe(className) {
      window.clearTimeout(swipeAnimationId);
      els.cardShell.classList.remove("swipe-next", "swipe-previous");
      void els.cardShell.offsetWidth;
      els.cardShell.classList.add(className);

      swipeAnimationId = window.setTimeout(() => {
        els.cardShell.classList.remove("swipe-next", "swipe-previous");
      }, 220);
    }

    function shuffleEntries(entries) {
      for (let index = entries.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [entries[index], entries[randomIndex]] = [entries[randomIndex], entries[index]];
      }
    }

    function shuffleDeck() {
      if (isRandomDrill()) return;

      shuffleEntries(state.currentDeck);
      state.currentIndex = 0;
      state.flipped = false;
      state.storyVisible = false;
      renderCard();
    }

    function toggleStory(event) {
      event.stopPropagation();

      if (touchGesture.suppressClick) {
        event.preventDefault();
        touchGesture.suppressClick = false;
        return;
      }

      const card = state.currentDeck[state.currentIndex];
      if (!card || !state.blurbs[card.word]) return;
      state.storyVisible = !state.storyVisible;
      renderCard();
    }

    els.homeButton.addEventListener("click", () => showHome());
    els.cardShell.addEventListener("click", handleCardClick);
    els.cardShell.addEventListener("touchstart", handleCardTouchStart, { passive: true });
    els.cardShell.addEventListener("touchmove", handleCardTouchMove, { passive: false });
    els.cardShell.addEventListener("touchend", handleCardTouchEnd, { passive: false });
    els.cardShell.addEventListener("touchcancel", handleCardTouchCancel, { passive: true });
    els.backButton.addEventListener("click", handleBack);
    els.shuffleButton.addEventListener("click", shuffleDeck);
    els.previousButton.addEventListener("click", () => moveCard(-1));
    els.flipButton.addEventListener("click", flipCard);
    els.nextButton.addEventListener("click", () => moveCard(1));
    els.storyButton.addEventListener("click", toggleStory);
    els.randomButton.addEventListener("click", openRandomWord);
    els.gotButton.addEventListener("click", () => recordDrillResult(true));
    els.missedButton.addEventListener("click", () => recordDrillResult(false));
    els.resetStatsButton.addEventListener("click", resetDrillStats);
    els.clusterSelect.addEventListener("change", () => showClusterGroups(Number(els.clusterSelect.value)));
    els.searchInput.addEventListener("input", scheduleSearch);
    els.searchInput.addEventListener("keydown", handleSearchInputKeydown);

    document.addEventListener("keydown", (event) => {
      if (els.study.classList.contains("hidden")) return;

      const activeTag = document.activeElement ? document.activeElement.tagName : "";
      const isTyping = activeTag === "INPUT" || activeTag === "TEXTAREA" || activeTag === "SELECT";
      if (isTyping) return;
      if ((event.key === " " || event.key === "Enter") && activeTag === "BUTTON") return;

      if (event.key === "ArrowLeft") {
        event.preventDefault();
        moveCard(-1);
      }

      if (event.key === "ArrowRight") {
        event.preventDefault();
        moveCard(1);
      }

      if (event.key === " " || event.key === "Enter") {
        event.preventDefault();
        flipCard();
      }
    });

    init();
  </script>
</body>
</html>
